<script>
let state = { dados: {}, meta: {} };

function fmtData(n) {
    if(!n) return "";
    const d = new Date(Math.round((n - 25569) * 86400 * 1000));
    return d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
}

async function carregar() {
    const res = await fetch("LIRAa Dados.xlsx");
    const wb = XLSX.read(await res.arrayBuffer(), { type: "array" });
    wb.SheetNames.forEach(name => {
        const ano = name.replace("LIRA_", "");
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1 });
        state.dados[ano] = {}; state.meta[ano] = [];
        let isF = false;
        raw.slice(1).forEach(row => {
            if (row[0] === 'F') { isF = true; return; }
            if (!isF && row[1]) {
                const b = row[1].trim().toUpperCase();
                state.dados[ano][b] = [];
                for (let i = 2; i < row.length; i += 3) {
                    state.dados[ano][b].push({ iip: row[i]||0, ib: row[i+1]||0, alb: row[i+2]||0 });
                }
            } else if (isF && row[0]) {
                state.meta[ano].push({ id: row[0], periodo: `${fmtData(row[1])} a ${fmtData(row[2])}` });
            }
        });
    });
    const anos = Object.keys(state.dados).sort().reverse();
    const sel = document.getElementById('selectAno');
    anos.forEach(a => sel.innerHTML += `<option value="${a}">${a}</option>`);
    sel.onchange = () => render(sel.value);
    render(anos[0]);
}

function getCor(v) { return v >= 4 ? 'v-risco' : v >= 1 ? 'v-alerta' : 'v-safe'; }

function render(ano) {
    document.getElementById('ano-label').textContent = ano;
    const ciclos = state.meta[ano], bairros = Object.keys(state.dados[ano]).sort();
    let h = `<tr><th rowspan="2">Nº</th><th rowspan="2" class="bairro-cell">Bairro</th>`;
    ciclos.forEach(c => h += `<th colspan="3">${c.id}<span class="data-ciclo">${c.periodo}</span></th>`);
    h += `<th colspan="3">MÉDIA ANUAL</th></tr><tr>`;
    ciclos.forEach(() => h += `<th>IIP</th><th>IB</th><th>ALB</th>`);
    h += `<th>IIP</th><th>IB</th><th>ALB</th></tr>`;
    document.getElementById('head-lira').innerHTML = h;

    let bHtml = '', totais = Array(ciclos.length * 3 + 3).fill(0);
    bairros.forEach((b, idx) => {
        let r = `<tr><td>${idx+1}</td><td class="bairro-cell">${b}</td>`, sIIP = 0, sIB = 0, sALB = 0;
        ciclos.forEach((_, cIdx) => {
            const d = state.dados[ano][b][cIdx] || {iip:0, ib:0, alb:0};
            sIIP += d.iip; sIB += d.ib; sALB += d.alb;
            totais[cIdx*3] += d.iip; totais[cIdx*3+1] += d.ib; totais[cIdx*3+2] += d.alb;
            r += `<td class="${getCor(d.iip)}">${d.iip.toFixed(1)}</td><td class="${getCor(d.ib)}">${d.ib.toFixed(1)}</td><td>${d.alb.toFixed(1)}</td>`;
        });
        const mIIP = sIIP / ciclos.length;
        const mIB  = sIB  / ciclos.length;
        const mALB = sALB; // ALB agora é SOMA, não média
        totais[totais.length-3] += mIIP; totais[totais.length-2] += mIB; totais[totais.length-1] += mALB;
        r += `<td class="bg-media ${getCor(mIIP)}">${mIIP.toFixed(1)}</td><td class="bg-media ${getCor(mIB)}">${mIB.toFixed(1)}</td><td class="bg-media">${mALB.toFixed(1)}</td></tr>`;
        bHtml += r;
    });
    document.getElementById('body-lira').innerHTML = bHtml;
    let fHtml = `<tr class="footer-media"><td>-</td><td class="text-start ps-3">MÉDIA DO MUNICÍPIO</td>`;
    totais.forEach((t, i) => {
    const isALB = (i % 3 === 2); // posição do ALB dentro de cada trio (IIP, IB, ALB)
    const valor = isALB ? t : (t / bairros.length);
    fHtml += `<td>${valor.toFixed(1)}</td>`;
});
    document.getElementById('foot-lira').innerHTML = fHtml + `</tr>`;
}



async function esperarImagensCarregarem(elemento) {
    const imagens = elemento.querySelectorAll("img");
    const promessas = [];

    imagens.forEach(img => {
        if (!img.complete) {
            promessas.push(new Promise(resolve => {
                img.onload = img.onerror = resolve;
            }));
        }
    });

    await Promise.all(promessas);
}






async function exportar(tipo) {
    const box = document.getElementById('capture-box');
    box.innerHTML = '';

    // 1️⃣ Cabeçalho institucional


    const headerClone = document.getElementById('header-portal').cloneNode(true);

// Força layout desktop mesmo em mobile
headerClone.style.display = 'flex';
headerClone.style.flexDirection = 'row';
headerClone.style.alignItems = 'center';
headerClone.style.justifyContent = 'space-between';
headerClone.style.width = '1000px';
headerClone.style.height = '90px';
headerClone.style.padding = '0 30px';

// Força os logos de apoio visíveis
headerClone.querySelectorAll('.apoios').forEach(a => a.style.display = 'flex');

// Remove restrições de tamanho das imagens que vinham do mobile
headerClone.querySelectorAll('img').forEach(img => {
    img.style.height = ''; 
    img.style.width = 'auto';
    img.crossOrigin = "anonymous";
});

box.appendChild(headerClone);

    // 2️⃣ Título do relatório
    const tituloClone = document.querySelector('#printable-area .text-center').cloneNode(true);
    box.appendChild(tituloClone);

    // 3️⃣ Cabeçalho da tabela
    const tableHeadClone = document.getElementById('head-lira').cloneNode(true);
    const tempTableHead = document.createElement('table');
    tempTableHead.className = 'table-lira';
    tempTableHead.appendChild(tableHeadClone);
    box.appendChild(tempTableHead);

    // 4️⃣ Espera imagens carregarem
    await esperarImagensCarregarem(box);




    if (tipo === 'png') {
    // Limpa o capture-box
    const box = document.getElementById('capture-box');
    box.innerHTML = '';

    // 1️⃣ Clona o header
    const headerClone = document.getElementById('header-portal').cloneNode(true);
    headerClone.style.width = "1000px";
    headerClone.style.height = "90px";
    headerClone.style.padding = "0 30px";
    headerClone.style.display = "flex";
    headerClone.style.alignItems = "center";
    headerClone.style.justifyContent = "space-between";
    const imgsHeader = headerClone.querySelectorAll("img");
    imgsHeader.forEach(img => img.crossOrigin = "anonymous");
    box.appendChild(headerClone);

    // 2️⃣ Clona o título
    const tituloClone = document.querySelector('#printable-area .text-center').cloneNode(true);
    box.appendChild(tituloClone);

    // 3️⃣ Clona a tabela inteira (thead + tbody + tfoot)
    const tableClone = document.getElementById('tabela-dados').cloneNode(true);
    tableClone.style.width = "1000px";
    tableClone.style.borderCollapse = "separate";
    box.appendChild(tableClone);

    // 4️⃣ Espera todas as imagens carregarem
    await esperarImagensCarregarem(box);

    // 5️⃣ Gera o canvas da tabela inteira
    const canvas = await html2canvas(box, {
        scale: 2,
        width: 1000,
        windowWidth: 1200,
        useCORS: true
    });

    // 6️⃣ Gera o download
    const link = document.createElement('a');
    link.download = `LIRAa_CG_${document.getElementById('selectAno').value}.png`;
    link.href = canvas.toDataURL();
    link.click();

    box.innerHTML = ''; // limpa o capture-box
    return;
}

    // 5️⃣ Exportar PDF
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfW = 210;
    const pageH = 297;

    // canvas do cabeçalho, título e thead
    const headerCanvas = await html2canvas(headerClone, { scale: 2, width: 1000, windowWidth: 1200, useCORS: true });
    const headerData = headerCanvas.toDataURL('image/png');
    const headerH = (headerCanvas.height * pdfW) / headerCanvas.width;

    const tituloCanvas = await html2canvas(tituloClone, { scale: 2, width: 1000, windowWidth: 1200, useCORS: true });
    const tituloData = tituloCanvas.toDataURL('image/png');
    const tituloH = (tituloCanvas.height * pdfW) / tituloCanvas.width;

    const theadCanvas = await html2canvas(tempTableHead, { scale: 2, width: 1000, windowWidth: 1200, useCORS: true });
    const theadData = theadCanvas.toDataURL('image/png');
    const theadH = (theadCanvas.height * pdfW) / theadCanvas.width;

    // 6️⃣ Linhas do tbody
    const rows = Array.from(document.querySelectorAll('#body-lira tr'));
    const rowsPorPagina = 38; // ajuste fino para caber no A4 considerando header, título e thead
    const totalPaginas = Math.ceil(rows.length / rowsPorPagina);
    let pagina = 1;

    for (let i = 0; i < rows.length; i += rowsPorPagina) {
        if (i > 0) pdf.addPage();

        let yOffset = 0;

        // Adiciona cabeçalho
        pdf.addImage(headerData, 'PNG', 0, yOffset, pdfW, headerH);
        yOffset += headerH + 2;

        // Adiciona título só na primeira página
        if (pagina === 1) {
            pdf.addImage(tituloData, 'PNG', 0, yOffset, pdfW, tituloH);
            yOffset += tituloH + 2;
        }

        // Adiciona thead da tabela
        // 🔹 Cria tabela temporária completa (thead + tbody + tfoot)
const tempTable = document.createElement('table');
tempTable.className = 'table-lira';

// Clona thead completo
tempTable.appendChild(document.getElementById('head-lira').cloneNode(true));

// Adiciona linhas do tbody dessa página
const tempBody = document.createElement('tbody');
rows.slice(i, i + rowsPorPagina).forEach(r => tempBody.appendChild(r.cloneNode(true)));
tempTable.appendChild(tempBody);

// Adiciona tfoot completo só na última página
if (i + rowsPorPagina >= rows.length) {
    const tfootClone = document.getElementById('foot-lira').cloneNode(true);
    tempTable.appendChild(tfootClone);
}

// Coloca no div temporário
const tempDiv = document.createElement('div');
tempDiv.style.width = "1000px";
tempDiv.style.padding = "0";
tempDiv.style.margin = "0";
tempDiv.appendChild(tempTable);
document.body.appendChild(tempDiv);

// Captura o canvas da tabela inteira
const blocoCanvas = await html2canvas(tempDiv, { scale: 2, width: 1000, windowWidth: 1200, useCORS: true });
const blocoData = blocoCanvas.toDataURL('image/png');
const blocoH = (blocoCanvas.height * pdfW) / blocoCanvas.width;

// Adiciona no PDF
pdf.addImage(blocoData, 'PNG', 0, yOffset, pdfW, blocoH);

// Remove temporário
document.body.removeChild(tempDiv);
        // Rodapé de página
        pdf.setFontSize(8);
        pdf.setTextColor(100);

        // 🔹 Texto à esquerda
        const anoSelecionado = document.getElementById('selectAno').value;
        pdf.text(`LIRAa - Levantamento Rápido de Índices para Aedes aegypti em Campina Grande - PB – ${anoSelecionado}`, 10, pageH - 10);

        // 🔹 Número da página à direita
        pdf.text(`Página ${pagina} de ${totalPaginas}`, pdfW - 10, pageH - 10, { align: 'right' });

        pagina++;
    }

    pdf.save(`Relatorio_LIRAa_CG_${document.getElementById('selectAno').value}.pdf`);


    
}


function exportarExcel() {
    XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabela-dados")), `Dados_LIRAa_${document.getElementById('selectAno').value}.xlsx`);
}
